name: bigpowers
version: 1.0.0
description: "37 agent skills for production-ready, TDD-driven software by solo developers"
commands:
  - name: audit-code
    description: "Self-review checklist for the coding agent to run before dispatching a reviewer. Checks CONVENTIONS.md compliance, Boy Scout Rule, test coverage, types, and SOLID. Produces a pass/fail checklist. Use before request-review, before committing, or when user asks for a code quality check."
    prompt_file: commands/audit-code.md
  - name: commit-message
    description: "Reviews working-tree changes, then drafts a Conventional Commits title/body and states the semantic-release version bump a single such commit would imply. Also notes which defensive-code categories were touched. Use when the user wants to commit recent work, prepare a Conventional Commits message, or asks for semantic-release / semver-consistent messaging before git commit."
    prompt_file: commands/commit-message.md
  - name: craft-skill
    description: "Create new bigpowers skills with proper structure, progressive disclosure, and bundled resources. Use when user wants to create, write, or build a new skill for the bigpowers lifecycle."
    prompt_file: commands/craft-skill.md
  - name: deepen-architecture
    description: "Find deepening opportunities in a codebase, informed by the domain language in specs/CONTEXT.md and the decisions in specs/adr/. Use when the user wants to improve architecture, find refactoring opportunities, consolidate tightly-coupled modules, or make a codebase more testable and AI-navigable."
    prompt_file: commands/deepen-architecture.md
  - name: define-language
    description: "Extract a DDD-style ubiquitous language glossary from the current conversation, flagging ambiguities and proposing canonical terms. Saves to specs/UBIQUITOUS_LANGUAGE.md. Use when user wants to define domain terms, build a glossary, harden terminology, create a ubiquitous language, or mentions "domain model" or "DDD"."
    prompt_file: commands/define-language.md
  - name: define-success
    description: "Convert an imperative task statement into explicit "step → verify: <cmd>" pairs before implementation begins. Use before plan-work when success criteria are unclear, when a task lacks verifiable checkpoints, or when user says "how will we know this is done?"."
    prompt_file: commands/define-success.md
  - name: delegate-task
    description: "Delegate one complex task to a single subagent, review its work in two stages before merging back. Sequential — one agent at a time, with oversight. Use when a task is complex and requires careful review before the result is accepted. Distinct from dispatch-agents (no parallelism here; reviewer sees full diff before proceeding)."
    prompt_file: commands/delegate-task.md
  - name: design-interface
    description: "Generate multiple radically different interface designs for a module using parallel sub-agents, then compare trade-offs. Based on "Design It Twice" from A Philosophy of Software Design. Use when user wants to design an API, explore interface options, compare module shapes, or mentions "design it twice"."
    prompt_file: commands/design-interface.md
  - name: develop-tdd
    description: "Test-driven development with red-green-refactor loop using vertical slices. Use when user wants to build features or fix bugs using TDD, mentions "red-green-refactor", wants integration tests, asks for test-first development, or wants to implement a task from specs/PLAN.md."
    prompt_file: commands/develop-tdd.md
  - name: diagnose-root
    description: "Run a 4-phase root cause analysis on an active problem: reproduce, isolate, hypothesize, verify. Use when a bug is confirmed but the root cause is unclear, when investigation needs to go deeper than symptoms, or when user mentions "root cause" or "why is this happening"."
    prompt_file: commands/diagnose-root.md
  - name: dispatch-agents
    description: "Dispatch multiple subagents in parallel on independent tasks. No waiting between them — all run concurrently. Use when tasks are truly decoupled and speed matters. Distinct from delegate-task (concurrent here, no inter-task review gate)."
    prompt_file: commands/dispatch-agents.md
  - name: edit-document
    description: "Edit and improve documents by restructuring sections, improving clarity, and tightening prose. Use when user wants to edit, revise, restructure, or improve any document — including specs/ files, articles, READMEs, or technical writing."
    prompt_file: commands/edit-document.md
  - name: elaborate-spec
    description: "Refine a rough idea into a clear, detailed specification through dialogue. Does not produce code. Use when user has a vague idea, wants to think through a feature before planning, or needs to turn "I want X" into a concrete spec."
    prompt_file: commands/elaborate-spec.md
  - name: enforce-first
    description: "Apply the F.I.R.S.T test quality rubric (Fast, Independent, Repeatable, Self-Validating, Timely) to a test suite or individual tests. Use when develop-tdd is writing tests, when test quality needs to be checked, or when user mentions F.I.R.S.T or "test quality"."
    prompt_file: commands/enforce-first.md
  - name: execute-plan
    description: "Batch-execute tasks from specs/PLAN.md sequentially, with a human checkpoint after each step. Use when user has an approved plan and wants to execute it step-by-step with oversight, or mentions "execute the plan" or "run the plan"."
    prompt_file: commands/execute-plan.md
  - name: grill-me
    description: "Interview the user relentlessly about a plan or design until reaching shared understanding, resolving each branch of the decision tree. Use when user wants to stress-test a plan, get grilled on their design, challenge assumptions, or mentions "grill me"."
    prompt_file: commands/grill-me.md
  - name: grill-with-docs
    description: "Stress-test a plan's assumptions by grounding every challenge in real library or API documentation URLs. Prevents hallucinated API usage before it gets into code. Use when the plan depends on a specific library or external API, when user wants to validate assumptions against real docs, or as a variant of grill-me for doc-grounded challenges."
    prompt_file: commands/grill-with-docs.md
  - name: guard-git
    description: "Block dangerous git commands (push, force push, reset --hard, clean, branch -D, checkout/restore .) before an AI agent runs them. Installs hook scripts for Claude Code, Cursor, Cursor CLI, and Gemini CLI; documents Google Antigravity Terminal deny lists. Use when the user wants git safety hooks, to block git push or destructive git in agents, or to mirror the same policy across AI coding tools."
    prompt_file: commands/guard-git.md
  - name: hook-commits
    description: "Set up pre-commit hooks with lint-staged (Prettier), type checking, and tests in the current repo. Use when user wants to add pre-commit hooks, set up Husky, configure lint-staged, or add commit-time formatting/typechecking/testing."
    prompt_file: commands/hook-commits.md
  - name: inspect-quality
    description: "Interactive QA session where user reports bugs or issues conversationally, and the agent logs them to specs/BUG-LOG.md with a structured audit schema. Explores the codebase in the background for context and domain language. Use when user wants to report bugs, do QA, or mentions "QA session"."
    prompt_file: commands/inspect-quality.md
  - name: investigate-bug
    description: "Investigate a bug or issue by exploring the codebase to find root cause, then write a TDD-based fix plan to specs/DIAGNOSIS.md. Use when user reports a bug, wants to investigate a problem, mentions "triage", or wants to plan a fix."
    prompt_file: commands/investigate-bug.md
  - name: kickoff-branch
    description: "Create a git worktree and feature branch, then verify a clean test baseline before any code is written. Use when starting a new feature or task, when user wants to work in isolation from main, or mentions "start a branch" or "new worktree"."
    prompt_file: commands/kickoff-branch.md
  - name: model-domain
    description: "Grilling session that challenges your plan against the existing domain model, sharpens terminology, and updates specs/CONTEXT.md and specs/adr/ inline as decisions crystallise. Use when user wants to stress-test a plan against their project's domain language and documented decisions."
    prompt_file: commands/model-domain.md
  - name: organize-workspace
    description: "Scans the active workspace for disposable artifacts—logs, caches, stale build output, and stray draft markdown—and proposes consolidation of scattered assets. Produces a reviewable list, asks for explicit confirmation before any delete or move, and optionally revises .gitignore. Use when the user says "clean my room", "organize workspace", "workspace cleanup", "remove temp files", "organize assets", "gitignore", or wants a safe tidy pass."
    prompt_file: commands/organize-workspace.md
  - name: plan-refactor
    description: "Create a detailed refactor plan with tiny commits via user interview, then save it as specs/REFACTOR.md. Use when user wants to plan a refactor, create a refactoring RFC, or break a refactor into safe incremental steps."
    prompt_file: commands/plan-refactor.md
  - name: plan-work
    description: "Write a detailed implementation plan to specs/PLAN.md. Every step must include a runnable verify command (Karpathy verification template). Use when user has a task to implement and needs a step-by-step plan with evidence checkpoints, or after slice-tasks produces specs/TASKS.md."
    prompt_file: commands/plan-work.md
  - name: release-branch
    description: "Make the merge/PR/keep/discard decision for a feature branch, verify coverage gates, create the PR with gh, and clean up the worktree. Use when a feature is done and ready to ship, or when user says "release", "merge", or "open a PR"."
    prompt_file: commands/release-branch.md
  - name: request-review
    description: "Dispatch a fresh reviewer agent with a clean context to critique the code after audit-code passes. The reviewer has no shared state with the coding agent and gives a genuine second opinion. Use after audit-code passes, before committing, or when user wants an independent code review."
    prompt_file: commands/request-review.md
  - name: respond-review
    description: "Act on a reviewer agent's feedback systematically — categorize findings, apply fixes, verify tests still pass. Use after request-review returns a report, or when user wants to work through code review findings."
    prompt_file: commands/respond-review.md
  - name: scope-work
    description: "Turn the current conversation context into a PRD and save it as specs/SCOPE.md. Use when user wants to define scope, create a PRD, or produce a spec from the current context."
    prompt_file: commands/scope-work.md
  - name: seed-conventions
    description: "Generate CLAUDE.md and CONVENTIONS.md for a brand-new project through a brief interview, and create the specs/ directory. Entry point for greenfield projects. Use when starting a new project from scratch, when user asks to set up AI agent conventions, or when there is no CLAUDE.md yet."
    prompt_file: commands/seed-conventions.md
  - name: slice-tasks
    description: "Break a plan, spec, or PRD into independently-grabbable tasks using tracer-bullet vertical slices. Saves to specs/TASKS.md. Use when user wants to convert a plan into tasks, create implementation tickets, or break down work into slices."
    prompt_file: commands/slice-tasks.md
  - name: spike-prototype
    description: "Throw-away prototype for unknown problem spaces. Output is learning notes in specs/SPIKE-<name>.md, not production code. Use when the domain or technology is unexplored, when estimates are impossible without experimentation, or when user says "spike", "prototype", or "proof of concept"."
    prompt_file: commands/spike-prototype.md
  - name: survey-context
    description: "Per-task context survey — reads specs/ and CONVENTIONS.md, maps the current lifecycle phase, and suggests the next skill to invoke. Use at the start of any new task, when returning to a project after a break, or when unsure what to do next."
    prompt_file: commands/survey-context.md
  - name: terse-mode
    description: "Fallback ultra-compressed communication mode. Cuts token usage ~75% by dropping filler, articles, and pleasantries while keeping full technical accuracy. Use ONLY when context is critically long and compressing output is necessary to continue. Not a strategy — token discipline comes from code shape (small functions, unique names, headless tests), not terser prompts. Use when user says "caveman mode", "terse mode", "less tokens", "be brief", or invokes /terse-mode."
    prompt_file: commands/terse-mode.md
  - name: using-bigpowers
    description: "One-time bootstrap that introduces the bigpowers skills system, the PMBOK lifecycle arc, and tells you which skill to call first for your situation. Use when starting with bigpowers for the first time, when user asks "where do I start?", or when the skills system needs to be explained."
    prompt_file: commands/using-bigpowers.md
  - name: validate-fix
    description: "Prove a fix works before declaring done — re-run the failing test, run the full suite, typecheck, lint, and harden against recurrence. Use after implementing a bug fix, when user says "is this fixed?", or before closing an investigation."
    prompt_file: commands/validate-fix.md
  - name: wire-observability
    description: "Add structured JSON logging, observability commands, and idempotent setup scripts to a project. Use when a project needs production-readiness instrumentation, when user wants structured logging, or as a production-readiness gate at any phase of development."
    prompt_file: commands/wire-observability.md
