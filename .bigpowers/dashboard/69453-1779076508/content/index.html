<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bigpowers Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #e2e8f0;
            --primary-color: #38bdf8;
            --card-bg: #1e293b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: var(--primary-color);
            margin-bottom: 30px;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .nav-card {
            background-color: var(--card-bg);
            padding: 20px 40px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: bold;
            font-size: 1.2em;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            min-width: 200px;
            text-align: center;
        }
        .nav-card:hover {
            transform: translateY(-5px);
            background-color: #334155;
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <h1>Bigpowers Visual Dashboard</h1>
    <div class="nav-links">
        <a href="release_plan.html" class="nav-card">Release Roadmap</a>
        <a href="gaps_analysis.html" class="nav-card">Gap Analysis</a>
        <a href="plan_v1_11_0.html" class="nav-card">v1.11.0 Plan</a>
    </div>
</body>
</html>
