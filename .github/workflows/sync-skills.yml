name: Sync Skills on Push

on:
  push:
    branches: [ main, develop ]
    paths:
      - '*/SKILL.md'
      - 'scripts/sync-skills.sh'
      - 'scripts/build-skill-index.sh'
      - '.github/workflows/sync-skills.yml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Sync skills and verify artifacts committed
        run: |
          bash scripts/sync-skills.sh
          git diff --exit-code \
            .cursor/rules \
            .gemini/extensions/bigpowers/skills \
            .gemini/extensions/bigpowers/commands \
            specs/SKILL-SEARCH-INDEX.md || {
            echo "::error::Generated artifacts out of date. Run: bash scripts/sync-skills.sh && git add -A && git commit"
            git diff --stat .cursor/rules .gemini/extensions/bigpowers/skills .gemini/extensions/bigpowers/commands specs/SKILL-SEARCH-INDEX.md
            exit 1
          }
